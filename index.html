<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MUDRA BULLIONS - Live Gold & Silver Rates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --gold-primary: #FFD700; --gold-dark: #D4AF37;
      --silver-primary: #C0C0C0; --silver-dark: #A8A8A8;
      --bg-dark: #0a0a0f; --bg-card: #14141f; --bg-card-hover: #1a1a2e;
      --text-primary: #ffffff; --text-secondary: #a0a0a0;
      --up-color: #00d26a; --down-color: #ff4757; --border-color: #2a2a3a;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; line-height: 1.6;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .header { text-align: center; padding: 40px 20px; border-bottom: 1px solid var(--border-color); margin-bottom: 30px; }
    .logo {
      font-size: 2.5rem; font-weight: 800;
      background: linear-gradient(135deg, var(--gold-primary) 0%, var(--gold-dark) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 10px; letter-spacing: 2px;
    }
    .tagline { color: var(--text-secondary); font-size: 1rem; letter-spacing: 3px; text-transform: uppercase; }
    .status-bar { display: flex; justify-content: center; align-items: center; gap: 30px; margin-bottom: 30px; flex-wrap: wrap; }
    .status-item { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); font-size: 0.9rem; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--up-color); animation: pulse 1.5s infinite; }
    .status-dot.offline { background: var(--down-color); animation: none; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .market-overview { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .overview-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; text-align: center; transition: all 0.3s ease; }
    .overview-card:hover { background: var(--bg-card-hover); border-color: var(--gold-dark); }
    .overview-card.gold { border-top: 3px solid var(--gold-primary); }
    .overview-card.silver { border-top: 3px solid var(--silver-primary); }
    .overview-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
    .overview-value { font-size: 1.8rem; font-weight: 700; color: var(--gold-primary); }
    .overview-card.silver .overview-value { color: var(--silver-primary); }
    .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid var(--border-color); }
    .section-icon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
    .section-icon.gold { background: rgba(255, 215, 0, 0.1); }
    .section-icon.silver { background: rgba(192, 192, 192, 0.1); }
    .section-title { font-size: 1.3rem; font-weight: 600; }
    .rates-section { margin-bottom: 40px; }
    .rates-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
    .rate-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; transition: all 0.3s ease; position: relative; overflow: hidden; }
    .rate-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--gold-primary); opacity: 0; transition: opacity 0.3s ease; }
    .rate-card.silver::before { background: var(--silver-primary); }
    .rate-card:hover::before { opacity: 1; }
    .rate-card:hover { background: var(--bg-card-hover); transform: translateY(-2px); }
    .rate-card.updating { animation: flash 0.5s ease; }
    @keyframes flash { 0%, 100% { background: var(--bg-card); } 50% { background: rgba(255, 215, 0, 0.1); } }
    .rate-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
    .rate-name { font-size: 0.9rem; font-weight: 500; color: var(--text-primary); line-height: 1.4; }
    .rate-id { font-size: 0.7rem; color: var(--text-secondary); background: rgba(255,255,255,0.05); padding: 2px 8px; border-radius: 4px; }
    .rate-prices { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .price-box { text-align: center; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 8px; }
    .price-label { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
    .price-value { font-size: 1.4rem; font-weight: 700; font-family: 'SF Mono', monospace; }
    .price-value.buy { color: var(--up-color); }
    .price-value.sell { color: var(--down-color); }
    .price-value.na { color: var(--text-secondary); }
    .rate-limits { display: flex; justify-content: space-between; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-color); font-size: 0.75rem; color: var(--text-secondary); }
    .limit-high { color: var(--up-color); }
    .limit-low { color: var(--down-color); }
    .loading-container { text-align: center; padding: 60px 20px; }
    .loading-spinner { width: 50px; height: 50px; border: 3px solid var(--border-color); border-top-color: var(--gold-primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--text-secondary); }
    .error-container { text-align: center; padding: 60px 20px; }
    .error-icon { font-size: 3rem; margin-bottom: 15px; }
    .error-text { color: var(--down-color); margin-bottom: 20px; }
    .retry-btn { background: var(--gold-primary); color: var(--bg-dark); border: none; padding: 12px 30px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
    .retry-btn:hover { background: var(--gold-dark); transform: translateY(-2px); }
    .footer { text-align: center; padding: 30px; border-top: 1px solid var(--border-color); color: var(--text-secondary); font-size: 0.85rem; }
    @media (max-width: 768px) {
      .logo { font-size: 1.8rem; }
      .rates-grid { grid-template-columns: 1fr; }
      .market-overview { grid-template-columns: repeat(2, 1fr); }
      .overview-value { font-size: 1.4rem; }
      .price-value { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    function App() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [lastUpdated, setLastUpdated] = useState('');
      const [isOnline, setIsOnline] = useState(true);
      const [updatingItems, setUpdatingItems] = useState(new Set());
      const previousData = useRef(null);

      const parseRates = (data) => {
        const lines = data.trim().split('\n');
        const rates = [];
        for (const line of lines) {
          const columns = line.split('\t');
          if (columns.length >= 6) {
            rates.push({ id: columns[0].trim(), name: columns[1].trim(), buy: columns[2].trim(), sell: columns[3].trim(), high: columns[4].trim(), low: columns[5].trim() });
          }
        }
        return rates;
      };

      const fetchRates = useCallback(async () => {
        try {
          const response = await fetch('/api/rates');
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          const newData = await response.json();
          const changedItems = new Set();
          if (previousData.current) {
            [...newData.gold, ...newData.silver].forEach(item => {
              const prevItem = [...previousData.current.gold, ...previousData.current.silver].find(p => p.id === item.id);
              if (prevItem && (prevItem.buy !== item.buy || prevItem.sell !== item.sell)) changedItems.add(item.id);
            });
          }
          if (changedItems.size > 0) { setUpdatingItems(changedItems); setTimeout(() => setUpdatingItems(new Set()), 500); }
          previousData.current = newData;
          setData(newData);
          setLastUpdated(new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true }));
          setIsOnline(true); setError(null);
        } catch (err) {
          console.error('Fetch error:', err);
          setIsOnline(false);
          if (!data) setError('Unable to connect to the server. Please try again later.');
        } finally { setLoading(false); }
      }, [data]);

      useEffect(() => { fetchRates(); }, [fetchRates]);
      useEffect(() => { const interval = setInterval(fetchRates, 30000); return () => clearInterval(interval); }, [fetchRates]);

      const formatPrice = (price) => price === '-' ? 'N/A' : price;

      if (loading) return <div className="container"><div className="loading-container"><div className="loading-spinner"></div><p className="loading-text">Loading live rates...</p></div></div>;
      if (error) return <div className="container"><div className="error-container"><div className="error-icon">⚠️</div><p className="error-text">{error}</p><button className="retry-btn" onClick={fetchRates}>Try Again</button></div></div>;

      return (
        <div className="container">
          <header className="header"><h1 className="logo">MUDRA BULLIONS</h1><p className="tagline">Live Gold & Silver Rates</p></header>
          <div className="status-bar">
            <div className="status-item"><span className={`status-dot ${isOnline ? '' : 'offline'}`}></span><span>{isOnline ? 'Live' : 'Offline'}</span></div>
            <div className="status-item"><span>Last Updated: {lastUpdated || '--'}</span></div>
            <div className="status-item"><span>Auto-refresh: 30s</span></div>
          </div>
          {data && (
            <div className="market-overview">
              <div className="overview-card gold"><div className="overview-label">Gold Price (per gram)</div><div className="overview-value">₹{data.market.goldPrice}</div></div>
              <div className="overview-card"><div className="overview-label">USD/INR</div><div className="overview-value">{data.market.usdInr}</div></div>
              <div className="overview-card gold"><div className="overview-label">Gold Cost</div><div className="overview-value">₹{data.market.goldCost}</div></div>
            </div>
          )}
          {data && data.gold.length > 0 && (
            <section className="rates-section">
              <div className="section-header"><div className="section-icon gold">🥇</div><h2 className="section-title">Gold Rates</h2></div>
              <div className="rates-grid">
                {data.gold.map((item) => (
                  <div key={item.id} className={`rate-card ${updatingItems.has(item.id) ? 'updating' : ''}`}>
                    <div className="rate-header"><span className="rate-name">{item.name}</span><span className="rate-id">#{item.id}</span></div>
                    <div className="rate-prices">
                      <div className="price-box"><div className="price-label">Buy</div><div className={`price-value buy ${item.buy === '-' ? 'na' : ''}`}>{formatPrice(item.buy)}</div></div>
                      <div className="price-box"><div className="price-label">Sell</div><div className={`price-value sell ${item.sell === '-' ? 'na' : ''}`}>{formatPrice(item.sell)}</div></div>
                    </div>
                    <div className="rate-limits"><span className="limit-low">L: {item.low}</span><span className="limit-high">H: {item.high}</span></div>
                  </div>
                ))}
              </div>
            </section>
          )}
          {data && data.silver.length > 0 && (
            <section className="rates-section">
              <div className="section-header"><div className="section-icon silver">🥈</div><h2 className="section-title">Silver Rates</h2></div>
              <div className="rates-grid">
                {data.silver.map((item) => (
                  <div key={item.id} className={`rate-card silver ${updatingItems.has(item.id) ? 'updating' : ''}`}>
                    <div className="rate-header"><span className="rate-name">{item.name}</span><span className="rate-id">#{item.id}</span></div>
                    <div className="rate-prices">
                      <div className="price-box"><div className="price-label">Buy</div><div className={`price-value buy ${item.buy === '-' ? 'na' : ''}`}>{formatPrice(item.buy)}</div></div>
                      <div className="price-box"><div className="price-label">Sell</div><div className={`price-value sell ${item.sell === '-' ? 'na' : ''}`}>{formatPrice(item.sell)}</div></div>
                    </div>
                    <div className="rate-limits"><span className="limit-low">L: {item.low}</span><span className="limit-high">H: {item.high}</span></div>
                  </div>
                ))}
              </div>
            </section>
          )}
          <footer className="footer"><p>MUDRA BULLIONS © {new Date().getFullYear()} | Live rates powered by Chirayu Software</p></footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
